<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORTNITE STYLE LOGIN (FANMADE)</title>
    <style>
        /* นำเข้าฟอนต์สไตล์เกมมิ่ง */
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Thai:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background: radial-gradient(circle, #232742 0%, #111322 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ตกแต่งพื้นหลังให้ดูมีมิติแบบไซไฟ */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: linear-gradient(45deg, rgba(0,0,0,0) 40%, rgba(243, 240, 47, 0.05) 50%, rgba(0,0,0,0) 60%);
            animation: shine 8s infinite linear;
        }

        @keyframes shine {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* กล่อง Login */
        .login-container {
            position: relative;
            background: rgba(20, 22, 37, 0.85);
            padding: 40px;
            border-radius: 4px;
            width: 100%;
            max-width: 450px;
            border: 3px solid #1c1f35;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 10;
            /* ตัดมุมเฉียงสไตล์ Fortnite */
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
        }

        /* เส้นขอบนีออนด้านบน */
        .login-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #f3f02f, #ff007f);
        }

        /* โลโก้จำลอง */
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            color: #fff;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px #f3f02f;
            margin-bottom: 5px;
            transform: italic;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #7a829d;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 35px;
        }

        /* ฟอร์มกรอกข้อมูล */
        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #a1a8c3;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: #121424;
            border: 2px solid #2d325a;
            color: #fff;
            font-size: 1rem;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s ease;
        }

        /* เอฟเฟกต์ตอนคลิกช่องกรอก */
        .input-group input:focus {
            border-color: #f3f02f;
            box-shadow: 0 0 10px rgba(243, 240, 47, 0.2);
            background: #17192e;
        }

        /* ปุ่มกดสุดเท่ */
        .btn-login {
            font-family: 'Bebas Neue', sans-serif;
            width: 100%;
            padding: 15px;
            background: #f3f02f;
            color: #000;
            border: none;
            font-size: 1.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            clip-path: polygon(0 0, 92% 0, 100% 30%, 100% 100%, 8% 100%, 0 70%);
        }

        .btn-login:hover {
            background: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* ข้อความแจ้งเตือนหลอกๆ */
        .fake-notice {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #535975;
        }

        .fake-notice a {
            color: #f3f02f;
            text-decoration: none;
        }

        .fake-notice a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">FORTNITE</div>
        <div class="subtitle">แฟนเมดเว็บบอร์ด / เข้าสู่ระบบ</div>

        <form onsubmit="handleFakeLogin(event)">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้ หรือ อีเมล</label>
                <input type="text" id="username" placeholder="EPIC GAMES ID" required>
            </div>

            <div class="input-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">LAUNCH GAME</button>
        </form>

        <div class="fake-notice">
            ยังไม่มีบัญชีใช่ไหม? <a href="#">สมัครสมาชิกฟรี</a><br>
            <span style="font-size: 0.7rem; display:block; margin-top:10px;">*นี่เป็นหน้าเว็บจำลองเพื่อการศึกษาเท่านั้น ไม่มีการเก็บข้อมูลจริง*</span>
        </div>
    </div>

    <script>
        // ฟังก์ชันดักจับตอนกดปุ่ม Login (ไม่ให้มันรีเฟรชหน้าจริง)
        function handleFakeLogin(event) {
            event.preventDefault(); // ป้องกันการเปลี่ยนหน้า
            
            const username = document.getElementById('username').value;
            
            // แสดง Alert เท่ๆ ตอบรับ
            alert(`ยินดีต้อนรับคุณ ${username}! \n\nระบบจำลองทำงานสำเร็จ (แต่นี่เป็นหน้าเว็บปลอมนะ นายผ่านด่านการสร้างเว็บแรกแล้ว!)`);
        }
    </script>

</body>
</html>
