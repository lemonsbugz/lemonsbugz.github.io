<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทดสอบความปลอดภัย - Lemonsbugz</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 25, 40, 0.75);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-color: #f3f4f6;
            --accent-color: #ff5e62;
            --accent-glow: rgba(255, 94, 98, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 94, 98, 0.1) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(0, 242, 254, 0.08) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-color);
            overflow: hidden;
        }

        /* แกนนำหลังฉาก */
        .glass-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            filter: blur(80px);
            opacity: 0.15;
            top: 20%;
            left: 25%;
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo-area {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #ff9966, #ff5e62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 0.95rem;
            color: #9ca3af;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #d1d5db;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            transition: color 0.3s;
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(17, 24, 39, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
            background: rgba(17, 24, 39, 0.8);
        }

        .form-control:focus + i {
            color: var(--accent-color);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff9966 0%, #ff5e62 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
            opacity: 0.95;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* ส่วนจัดแสดง Modal ผลลัพธ์ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal-card {
            background: #111827;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 94, 98, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--accent-color);
            font-size: 2rem;
            border: 1px solid rgba(255, 94, 98, 0.3);
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: white;
        }

        .modal-desc {
            color: #9ca3af;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .modal-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn:hover {
            background: #374151;
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* ส่วนของอนิเมชันตอนกด Login */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-credit {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #4b5563;
        }
    </style>
</head>
<body>

    <div class="glass-bg"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">LEMONSBUGZ</div>
            <div class="tagline">ระบบทดสอบล็อกอินส่วนบุคคล</div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">บัญชีผู้ใช้ (Username)</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" class="form-control" placeholder="ใส่ชื่อบัญชีอะไรก็ได้เพื่อทดสอบ" required autocomplete="off">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">รหัสผ่าน (Password)</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="off">
                        <i class="fa-solid fa-key"></i>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="btnText">เข้าสู่ระบบ</span>
                    <div class="spinner" id="btnSpinner"></div>
                </button>
            </form>

            <div class="footer-credit">
                &copy; 2026 lemonsbugz.github.io - All Rights Reserved.
            </div>
        </div>
    </div>

    <!-- กล่องป๊อปอัปผลลัพธ์การทดสอบ -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-card">
            <div class="modal-icon">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <div class="modal-title">ยินดีด้วย! ระบบตอบสนองปกติ</div>
            <div class="modal-desc" id="modalText">
                คุณกรอก Username และ Password เรียบร้อย แต่ตามที่คุณตั้งโจทย์ไว้ "Login ไม่ได้หรอกนะ มีไว้สำหรับทดสอบอินเตอร์เฟสเฉยๆ" ระบบนี้จึงทำหน้าที่บันทึกการคลิกจำลองเท่านั้น!
            </div>
            <button class="modal-btn" onclick="closeModal()">รับทราบ</button>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            // ป้องกันไม่ให้หน้าเว็บรีเฟรชตัวเอง
            event.preventDefault();
            
            const usernameVal = document.getElementById('username').value;
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const loginBtn = document.getElementById('loginBtn');

            // เริ่มแสดงสถานะ Loading (หมุนๆ)
            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';
            loginBtn.disabled = true;

            // จำลองเวลาเช็กฐานข้อมูลปลอมๆ 1.2 วินาที
            setTimeout(() => {
                // เปลี่ยนข้อความเพื่อต้อนรับคุณ
                document.getElementById('modalText').innerHTML = `ระบบได้รับข้อมูลบัญชี <strong>"${usernameVal}"</strong> แล้ว!<br><br>แต่ตามที่คุณตั้งโจทย์ไว้ <i>"ล็อกอินไม่ได้หรอกนะ มีไว้เพื่อทดสอบเฉยๆ"</i> นี่จึงเป็นแค่การทดสอบ UI แบบจำลองพฤติกรรมความเร็วสูงครับ`;
                
                // แสดงผลป๊อปอัปหรูๆ
                document.getElementById('resultModal').classList.add('active');

                // คืนค่าปุ่มให้เป็นปกติ
                btnText.style.display = 'block';
                btnSpinner.style.display = 'none';
                loginBtn.disabled = false;
            }, 1200);
        }

        function closeModal() {
            document.getElementById('resultModal').classList.remove('active');
            // เคลียร์ค่าฟอร์มกลับเป็นค่าว่าง
            document.getElementById('loginForm').reset();
        }
    </script>
</body>
</html>
