<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHOOL SYSTEM - LOGIN</title>
    <style>
        /* นำเข้าฟอนต์ใหม่: 'Cinzel' สำหรับหัวข้อที่หรูหรา และ 'Montserrat'/'Noto Sans Thai' สำหรับความโมเดิร์น */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@400;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Thai', 'Montserrat', sans-serif;
            background: radial-gradient(circle, #1a1c2e 0%, #0d0e17 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ตกแต่งพื้นหลังให้ดูมีมิติ สบายตาขึ้น */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: linear-gradient(45deg, rgba(0,0,0,0) 40%, rgba(229, 193, 88, 0.03) 50%, rgba(0,0,0,0) 60%);
            animation: shine 12s infinite linear;
        }

        @keyframes shine {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* กล่อง Login */
        .login-container {
            position: relative;
            background: rgba(18, 20, 32, 0.9);
            padding: 45px 40px;
            border-radius: 6px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(229, 193, 88, 0.15);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(229, 193, 88, 0.02);
            text-align: center;
            z-index: 10;
            clip-path: polygon(0 0, 94% 0, 100% 6%, 100% 100%, 6% 100%, 0 94%);
        }

        /* เส้นขอบหรูหราด้านบน */
        .login-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #cda250, #e5c158, #cda250);
        }

        /* หัวข้อหลัก SCHOOL SYSTEM (ปรับปรุงใหม่ตามบรีฟ) */
        .logo-wrapper {
            margin-bottom: 8px;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: 3px;
            line-height: 1.2;
            text-transform: uppercase;
            color: #ffffff;
            /* ใช้การไล่เฉดสีอ่อนๆ และซ้อนเงาแบบนุ่มนวลให้อ่านง่ายแต่เท่ */
            text-shadow: 0 0 15px rgba(225, 225, 225, 0.1), 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        /* ปรับเฉพาะคำว่า SYSTEM ให้เป็นสีทองพรีเมียม เพื่อแยกคำให้สบายสายตามากขึ้น */
        .logo span {
            color: #e5c158;
            text-shadow: 0 0 20px rgba(229, 193, 88, 0.25), 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 0.85rem;
            font-weight: 500;
            color: #727996;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 35px;
        }

        /* ฟอร์มกรอกข้อมูล */
        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #8c94b5;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1.5px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 18px;
            background: #0f101a;
            border: 1px solid #25283d;
            color: #fff;
            font-size: 0.95rem;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Montserrat', 'Noto Sans Thai', sans-serif;
        }

        /* เอฟเฟกต์ตอนคลิกช่องกรอก (เปลี่ยนจากเหลืองแป๋นเป็นสีทองนุ่มๆ) */
        .input-group input:focus {
            border-color: #e5c158;
            box-shadow: 0 0 12px rgba(229, 193, 88, 0.15);
            background: #131524;
        }

        /* ปุ่มกดดีไซน์เรียบหรูสไตล์อินเตอร์เฟสเกม */
        .btn-login {
            font-family: 'Montserrat', 'Noto Sans Thai', sans-serif;
            font-weight: 700;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e5c158 0%, #cda250 100%);
            color: #0b0c13;
            border: none;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            clip-path: polygon(0 0, 93% 0, 100% 30%, 100% 100%, 7% 100%, 0 70%);
            box-shadow: 0 4px 15px rgba(205, 162, 80, 0.2);
        }

        .btn-login:hover {
            background: #ffffff;
            color: #0b0c13;
            transform: scale(1.015);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.25);
        }

        .btn-login:active {
            transform: scale(0.985);
        }

        /* ข้อความแจ้งเตือนหลอกๆ */
        .fake-notice {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #4f546e;
            line-height: 1.6;
        }

        .fake-notice a {
            color: #e5c158;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .fake-notice a:hover {
            color: #fff;
            text-decoration: underline;
        }

        .welcome-badge {
            font-size: 0.75rem;
            display: inline-block;
            margin-top: 12px;
            padding: 4px 12px;
            background: rgba(229, 193, 88, 0.06);
            color: #e5c158;
            border-radius: 20px;
            border: 1px solid rgba(229, 193, 88, 0.12);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-wrapper">
            <div class="logo">School <span>System</span></div>
        </div>
        <div class="subtitle">เข้าสู่ระบบเอกสารโรงเรียน</div>

        <form onsubmit="handleFakeLogin(event)">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="off" required>
            </div>

            <div class="input-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">LOGIN</button>
        </form>

        <div class="fake-notice">
            หากยังไม่มีบัญชีเข้าใช้งาน? <a href="#">ติดต่อผู้ดูแลระบบ</a><br>
            <div class="welcome-badge">ยินดีต้อนรับคณะครูและบุคลากร</div>
        </div>
    </div>

    <script>
        function handleFakeLogin(event) {
            event.preventDefault(); 
            
            const username = document.getElementById('username').value;
            
            // แสดง Alert ตอบรับที่ดูเข้ากับระบบมากขึ้น
            alert(`[ระบบจำลอง] ยินดีต้อนรับคุณ ${username} เข้าสู่ระบบ!\n\nการทดสอบหน้าเว็บแรกของคุณสำเร็จแล้ว ยินดีด้วยครับ!`);
        }
    </script>

</body>
</html>
