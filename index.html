<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHOOL SYSTEM - LOGIN</title>
    <style>
        /* นำเข้าฟอนต์ใหม่: 'Cinzel' สำหรับหัวข้อที่หรูหรา และ 'Montserrat'/'Noto Sans Thai' สำหรับความโมเดิร์น */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@400;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Thai', 'Montserrat', sans-serif;
            /* เปลี่ยนพื้นหลังเป็นสีดำสนิทเพื่อรองรับ Three.js Dotted Background */
            background-color: #000000; 
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Container สำหรับถือ Canvas ของ Three.js */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; /* อยู่หลังกล่องข้อความ */
            pointer-events: none;
        }

        /* แสง Glow สีขาวนุ่มๆ ด้านบน */
        .glow-overlay {
            pointer-events: none;
            position: absolute;
            -top-10: -40px;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translateX(-50%);
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.04), transparent 45%);
            filter: blur(40px);
            z-index: 2;
        }

        /* กล่อง Login (ยกระดับ z-index ขึ้นมาเพื่อให้อยู่เหนือพื้นหลัง 3D) */
        .login-container {
            position: relative;
            background: rgba(18, 20, 32, 0.85); /* เพิ่มความโปร่งแสงเล็กน้อยให้เห็นมิติด้านหลัง */
            backdrop-filter: blur(8px); /* เพิ่มเอฟเฟกต์กระจกฝ้าให้ตัดกับจุดสีขาว */
            padding: 45px 40px;
            border-radius: 6px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(229, 193, 88, 0.2);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(229, 193, 88, 0.02);
            text-align: center;
            z-index: 10;
            clip-path: polygon(0 0, 94% 0, 100% 6%, 100% 100%, 6% 100%, 0 94%);
        }

        /* เส้นขอบหรูหราด้านบน */
        .login-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #cda250, #e5c158, #cda250);
        }

        /* หัวข้อหลัก SCHOOL SYSTEM */
        .logo-wrapper {
            margin-bottom: 8px;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: 3px;
            line-height: 1.2;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(225, 225, 225, 0.1), 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        /* ปรับเฉพาะคำว่า SYSTEM ให้เป็นสีทองพรีเมียม */
        .logo span {
            color: #e5c158;
            text-shadow: 0 0 20px rgba(229, 193, 88, 0.25), 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 0.85rem;
            font-weight: 500;
            color: #727996;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 35px;
        }

        /* ฟอร์มกรอกข้อมูล */
        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #8c94b5;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1.5px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 18px;
            background: #0f101a;
            border: 1px solid #25283d;
            color: #fff;
            font-size: 0.95rem;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Montserrat', 'Noto Sans Thai', sans-serif;
        }

        /* เอฟเฟกต์ตอนคลิกช่องกรอก */
        .input-group input:focus {
            border-color: #e5c158;
            box-shadow: 0 0 12px rgba(229, 193, 88, 0.15);
            background: #131524;
        }

        /* ปุ่มกดดีไซน์เรียบหรูสไตล์อินเตอร์เฟสเกม */
        .btn-login {
            font-family: 'Montserrat', 'Noto Sans Thai', sans-serif;
            font-weight: 700;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e5c158 0%, #cda250 100%);
            color: #0b0c13;
            border: none;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            clip-path: polygon(0 0, 93% 0, 100% 30%, 100% 100%, 7% 100%, 0 70%);
            box-shadow: 0 4px 15px rgba(205, 162, 80, 0.2);
        }

        .btn-login:hover {
            background: #ffffff;
            color: #0b0c13;
            transform: scale(1.015);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.25);
        }

        .btn-login:active {
            transform: scale(0.985);
        }

        /* ข้อความแจ้งเตือน */
        .fake-notice {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #4f546e;
            line-height: 1.6;
        }

        .fake-notice a {
            color: #e5c158;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .fake-notice a:hover {
            color: #fff;
            text-decoration: underline;
        }

        .welcome-badge {
            font-size: 0.75rem;
            display: inline-block;
            margin-top: 12px;
            padding: 4px 12px;
            background: rgba(229, 193, 88, 0.06);
            color: #e5c158;
            border-radius: 20px;
            border: 1px solid rgba(229, 193, 88, 0.12);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="glow-overlay"></div>

    <div class="login-container">
        <div class="logo-wrapper">
            <div class="logo">School <span>System</span></div>
        </div>
        <div class="subtitle">เข้าสู่ระบบเอกสารโรงเรียน</div>

        <form onsubmit="handleFakeLogin(event)">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="off" required>
            </div>

            <div class="input-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">LOGIN</button>
        </form>

        <div class="fake-notice">
            หากยังไม่มีบัญชีเข้าใช้งาน? <a href="#">ติดต่อผู้ดูแลระบบ</a><br>
            <div class="welcome-badge">ยินดีต้อนรับคณะครูและบุคลากร</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // --- ส่วนควบคุมระบบหลังบ้านของกราฟิกจุด 3D ---
        const container = document.getElementById('canvas-container');
        let scene, camera, renderer, geometry, material, points;
        let animationId;
        let count = 0;

        const SEPARATION = 150;
        const AMOUNTX = 40;
        const AMOUNTY = 60;

        function initThreeJS() {
            scene = new THREE.Scene();
            
            // ตั้งค่าหมอกสีดำเพื่อให้จุดค่อยๆ จมหายไปในความมืด
            scene.fog = new THREE.Fog(0x000000, 2000, 10000);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000);
            // ปรับระดับมุมกล้องเล็กน้อยให้รับเข้ากับกล่อง Login ได้สวยงามขึ้น
            camera.position.set(0, 400, 1300);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(scene.fog.color, 1); 

            container.appendChild(renderer.domElement);

            const positions = [];
            const colors = [];
            geometry = new THREE.BufferGeometry();

            for (let ix = 0; ix < AMOUNTX; ix++) {
                for (let iy = 0; iy < AMOUNTY; iy++) {
                    const x = ix * SEPARATION - (AMOUNTX * SEPARATION) / 2;
                    const y = 0; 
                    const z = iy * SEPARATION - (AMOUNTY * SEPARATION) / 2;

                    positions.push(x, y, z);
                    colors.push(1.0, 1.0, 1.0); // จุดสีขาวบริสุทธิ์
                }
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            material = new THREE.PointsMaterial({
                size: 7, 
                vertexColors: true,
                transparent: true,
                opacity: 1.0, 
                sizeAttenuation: true,
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            animate();
        }

        // ตัวขับเคลื่อนอนิเมชั่นคลื่นระลอกน้ำ
        function animate() {
            animationId = requestAnimationFrame(animate);

            const positionAttribute = geometry.attributes.position;
            const positions = positionAttribute.array;

            let i = 0;
            for (let ix = 0; ix < AMOUNTX; ix++) {
                for (let iy = 0; iy < AMOUNTY; iy++) {
                    const index = i * 3;

                    // คำนวณความสูงต่ำแบบระลอกคลื่นคู่ (Sin Wave)
                    positions[index + 1] =
                        Math.sin((ix + count) * 0.3) * 50 +
                        Math.sin((iy + count) * 0.5) * 50;

                    i++;
                }
            }

            positionAttribute.needsUpdate = true;
            renderer.render(scene, camera);
            count += 0.08; // ความเร็วของคลื่น (ปรับลดลงเล็กน้อยเพื่อให้ดูนุ่มนวลสบายตาขึ้นขณะกรอกข้อมูล)
        }

        // รองรับระบบย่อขยายหน้าจออัตโนมัติ
        window.addEventListener('resize', () => {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // เริ่มทำงานกราฟิก
        initThreeJS();

        // --- ส่วนจำลองระบบ Login ---
        function handleFakeLogin(event) {
            event.preventDefault(); 
            const username = document.getElementById('username').value;
            alert(`[ระบบจำลอง] ชื่อผู้ใช้/รหัสผ่านของคุณ ${username} ผิดนะ!\n\nโปรดติดต่อผู้ดูแลระบบ`);
        }
    </script>

</body>
</html>
