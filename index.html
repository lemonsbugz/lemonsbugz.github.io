<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Pages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffe6f2; /* พื้นหลังสีชมพูพาสเทลอ่อนๆ */
            background-image: radial-gradient(#fff 20%, transparent 20%),
                              radial-gradient(#fff 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px; /* ลายจุด Polka Dot เพิ่มความน่ารัก */
            overflow: hidden; /* ซ่อน scrollbar ไม่ให้จอขยับตามตัวอักษร */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* สไตล์ Word Art */
        .word-art {
            font-family: 'Fredoka', sans-serif;
            font-size: 5rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #ff4d94; /* สีชมพูเข้ม */
            
            /* สร้างมิติแบบ Word Art ด้วยการซ้อนเงาหลายๆ ชั้น */
            text-shadow: 
                3px 3px 0px #fff, 
                6px 6px 0px #ffb3d9, 
                9px 9px 20px rgba(0, 0, 0, 0.15);
            
            position: absolute;
            user-select: none;
            white-space: nowrap;

            /* สั่งให้เล่นแอนิเมชันพร้อมกันทั้งเด้งและหมุน */
            animation: bounce Around 8s linear infinite, rotateArt 4s ease-in-out infinite alternate;
        }

        /* แอนิเมชันสำหรับเด้งไปทั่วหน้าจอ (Bounce) */
        @keyframes bounceAround {
            0% {
                top: 10%;
                left: 10%;
            }
            25% {
                top: 80%;
                left: 40%;
            }
            50% {
                top: 20%;
                left: 70%;
            }
            75% {
                top: 70%;
                left: 20%;
            }
            100% {
                top: 10%;
                left: 10%;
            }
        }

        /* แอนิเมชันเสริมความดุ๊กดิ๊ก บิดไปบิดมาเล็กน้อย */
        @keyframes rotateArt {
            0% {
                transform: scale(1) rotate(-5deg);
            }
            100% {
                transform: scale(1.1) rotate(5deg); /* ขยายใหญ่ขึ้นนิดหน่อยตอนสลับฝั่ง */
            }
        }
    </style>
</head>
<body>

    <div class="word-art">HELLO WORLD</div>

</body>
</html>
