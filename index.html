<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <!-- นำเข้าฟอนต์ลายเส้นสวยๆ หรูๆ จาก Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* พื้นหลังไล่เฉดสีพาสเทลให้ดูละมุนสายตา */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* สไตล์ Word Art แบบเรียบหรูดูดี */
        .beautiful-wordart {
            font-family: 'Poppins', sans-serif;
            font-size: 6rem;
            font-weight: 700;
            font-style: italic; /* เอียงนิดๆ ให้ดูมีลูกเล่น */
            
            /* ใช้เทคนิคไล่เฉดสีเข้าไปในตัวอักษร (Gradient Text) */
            background: linear-gradient(45deg, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* ใส่เงาด้านหลังแบบ Soft Shadow ให้ตัวอักษรดูลอยเด่นขึ้นมา */
            filter: drop-shadow(4px 6px 10px rgba(255, 117, 140, 0.3));
            
            /* ใส่แอนิเมชันขยับขึ้นลงนุ่มๆ เหมือนลอยอยู่ในน้ำ (Floating Effect) */
            animation: floatAnimation 3s ease-in-out infinite alternate;
        }

        /* เอฟเฟกต์ลอยละล่องแบบนุ่มนวล */
        @keyframes floatAnimation {
            0% {
                transform: translateY(0px);
            }
            100% {
                transform: translateY(-15px); /* ลอยขึ้นบนเล็กน้อย */
            }
        }

        /* รองรับการแสดงผลบนหน้าจอมือถือให้ขนาดเล็กลงอัตโนมัติ */
        @media (max-width: 768px) {
            .beautiful-wordart {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- ข้อความ Word Art สวยๆ -->
    <div class="beautiful-wordart">Hello World</div>

</body>
</html>
